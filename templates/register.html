{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 500px;">
    <h2 class="text-center">Registrieren</h2>
    <form method="POST">
        <div class="form-group">
            <label>Benutzername</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Passwort</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Admin-Key (optional)</label>
            <input type="password" name="admin_key" class="form-control">
        </div>
        <button type="submit" class="btn btn-warning btn-block">Konto erstellen</button>
    </form>
</div>
{% endblock %}
