{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 500px;">
    <h2 class="text-center mb-4 text-warning">Registrieren</h2>
    <form method="POST">
        <div class="form-group">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email Adresse</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" class="form-control" 
                   minlength="10"
                   pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z0-9]).{10,}"
                   title="Mindestens 10 Zeichen, ein Großbuchstabe, ein Kleinbuchstabe und ein Sonderzeichen."
                   required>
            <small class="form-text text-muted">
                Regeln: Min. 10 Zeichen, Groß- & Kleinbuchstaben, Sonderzeichen.
            </small>
        </div>
        <div class="form-group">
            <label for="admin_key">Admin-Key (optional)</label>
            <input type="password" id="admin_key" name="admin_key" class="form-control" placeholder="Nur für Administratoren">
        </div>
        <button type="submit" class="btn btn-warning btn-block font-weight-bold shadow-sm">Konto erstellen</button>
    </form>
    <p class="text-center mt-3 small">Bereits ein Konto? <a href="{{ url_for('login') }}">Hier einloggen</a></p>
</div>
{% endblock %}
