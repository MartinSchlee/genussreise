{% extends "base.html" %}

{% block content %}
<h2>Neues Rezept erstellen</h2>
<form method="POST" enctype="multipart/form-data">
    <div class="form-group">
        <label for="recipe_name">Rezeptname</label>
        <input type="text" class="form-control" id="recipe_name" name="recipe_name" required>
    </div>
    <div class="form-group">
        <label for="category_id">Kategorie</label>
        <select class="form-control" id="category_id" name="category_id" required>
            <option value="">Bitte wählen...</option>
            {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
        </select>
    </div>
     <div class="form-group">
        <label for="image_file">Rezeptbild</label>
        <input type="file" class="form-control-file" id="image_file" name="image_file">
    </div>

    <!-- HIER WURDE "PORTIONEN" HINZUGEFÜGT -->
    <fieldset class="mb-3">
        <legend class="h6">Allgemeine Angaben</legend>
        <div class="form-row">
            <div class="col"><label>Portionen</label><input type="text" class="form-control" name="servings" placeholder="z.B. 4"></div>
            <div class="col"><label>Vorbereitung</label><input type="text" class="form-control" name="prep_time" placeholder="z.B. 20 Min"></div>
            <div class="col"><label>Garzeit</label><input type="text" class="form-control" name="cook_time" placeholder="z.B. 30 Min"></div>
            <div class="col"><label>Ruhezeit</label><input type="text" class="form-control" name="rest_time" placeholder="z.B. 1 Std"></div>
            <div class="col"><label>Gesamtzeit</label><input type="text" class="form-control" name="total_time" placeholder="z.B. 50 Min"></div>
        </div>
    </fieldset>

    <fieldset id="ingredients-container" class="mb-3">
        <legend class="h6">Zutaten</legend>
        <div class="ingredient-row form-row align-items-end mb-2">
            <div class="col-md-2"><label>Menge</label><input type="text" name="quantity[]" class="form-control"></div>
            <div class="col-md-2"><label>Einheit</label><input type="text" name="unit[]" class="form-control"></div>
            <div class="col"><label>Zutat</label><input type="text" name="ingredient_name[]" class="form-control"></div>
        </div>
    </fieldset>
    <button type="button" id="add-ingredient" class="btn btn-secondary btn-sm mb-3">Weitere Zutat hinzufügen</button>

    <div class="form-group">
        <label for="instructions">Zubereitung</label>
        <textarea class="form-control" id="instructions" name="instructions" rows="10" required></textarea>
    </div>

    <!-- HIER WURDE DIE ÜBERSCHRIFT GEÄNDERT & "PORTIONEN" ENTFERNT -->
    <fieldset class="mb-3">
        <legend class="h6">Nährwertangaben pro 100g (optional)</legend>
        <div class="form-row">
            <div class="col"><input type="text" class="form-control" name="calories" placeholder="Kalorien"></div>
            <div class="col"><input type="text" class="form-control" name="protein" placeholder="Protein"></div>
            <div class="col"><input type="text" class="form-control" name="carbs" placeholder="Kohlenhydrate"></div>
            <div class="col"><input type="text" class="form-control" name="fat" placeholder="Fett"></div>
        </div>
    </fieldset>

    <button type="submit" class="btn btn-primary">Rezept speichern</button>
</form>

<script>
document.getElementById('add-ingredient').addEventListener('click', function() {
    const container = document.getElementById('ingredients-container');
    const newRow = document.createElement('div');
    newRow.className = 'ingredient-row form-row align-items-end mb-2';
    newRow.innerHTML = `
        <div class="col-md-2"><input type="text" name="quantity[]" class="form-control"></div>
        <div class="col-md-2"><input type="text" name="unit[]" class="form-control"></div>
        <div class="col"><input type="text" name="ingredient_name[]" class="form-control"></div>
    `;
    container.appendChild(newRow);
});
</script>
{% endblock %}
