{% extends "base.html" %}
{% block content %}
<div class="card shadow border-0 p-4 mb-5">
    <h2 class="mb-4 text-warning">Neues Rezept erstellen</h2>
    <form action="{{ url_for('add_recipe') }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="recipe_name" class="font-weight-bold">Name des Rezepts</label>
            <input type="text" id="recipe_name" name="recipe_name" class="form-control" placeholder="z.B. Mediterrane Pasta" required>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label for="category_id" class="font-weight-bold">Kategorie</label>
                    <select id="category_id" name="category_id" class="form-control">
                        {% for cat in all_categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label for="recipe_image" class="font-weight-bold">Bild hochladen</label>
                    <input type="file" id="recipe_image" name="recipe_image" class="form-control-file border p-1 rounded bg-white">
                </div>
            </div>
        </div>

        <h5 class="text-secondary mt-3">Zeiten & Portionen</h5>
        <div class="row bg-light p-3 rounded mb-4 mx-0">
            <div class="col-md-3">
                <label for="prep_time" class="small">Vorbereitung (Min)</label>
                <input type="number" id="prep_time" name="prep_time" class="form-control">
            </div>
            <div class="col-md-3">
                <label for="cook_time" class="small">Kochen (Min)</label>
                <input type="number" id="cook_time" name="cook_time" class="form-control">
            </div>
            <div class="col-md-3">
                <label for="rest_time" class="small">Ruhen (Min)</label>
                <input type="number" id="rest_time" name="rest_time" class="form-control">
            </div>
            <div class="col-md-3">
                <label for="servings" class="small">Portionen</label>
                <input type="number" id="servings" name="servings" class="form-control">
            </div>
        </div>

        <h5 class="text-secondary">Zutaten</h5>
        <div id="ingredient-container" class="mb-3">
            <div class="row mb-2">
                <div class="col-md-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div>
                <div class="col-md-8"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div>
            </div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-info mb-4" onclick="addIngredientRow()">+ Zutat hinzufügen</button>

        <h5 class="text-secondary">Nährwerte (pro 100g)</h5>
        <div class="row bg-light p-3 rounded mb-4 mx-0">
            <div class="col-md-3">
                <label for="calories" class="small">Kalorien (kcal)</label>
                <input type="number" id="calories" name="calories" class="form-control">
            </div>
            <div class="col-md-3">
                <label for="protein" class="small">Eiweiß (g)</label>
                <input type="number" id="protein" step="0.1" name="protein" class="form-control">
            </div>
            <div class="col-md-3">
                <label for="carbs" class="small">KH (g)</label>
                <input type="number" id="carbs" step="0.1" name="carbs" class="form-control">
            </div>
            <div class="col-md-3">
                <label for="fat" class="small">Fett (g)</label>
                <input type="number" id="fat" step="0.1" name="fat" class="form-control">
            </div>
        </div>

        <div class="form-group">
            <label for="instructions" class="font-weight-bold">Zubereitung</label>
            <textarea id="instructions" name="instructions" class="form-control" rows="8" required></textarea>
        </div>
        
        <button type="submit" class="btn btn-warning btn-block font-weight-bold shadow-sm">Rezept speichern</button>
    </form>
</div>

<script>
function addIngredientRow() {
    const container = document.getElementById('ingredient-container');
    const div = document.createElement('div');
    div.className = 'row mb-2';
    div.innerHTML = '<div class="col-md-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div><div class="col-md-8"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div>';
    container.appendChild(div);
}
</script>
{% endblock %}
