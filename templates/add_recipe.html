{% extends "base.html" %}
{% block content %}
<div class="card shadow border-0 p-4 mb-5">
    <h2 class="mb-4 text-warning">Neues Rezept erstellen</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group"><label class="font-weight-bold">Name des Rezepts</label><input type="text" name="recipe_name" class="form-control" required></div>
        <div class="row">
            <div class="col-md-6"><label class="font-weight-bold">Kategorie</label><select name="category_id" class="form-control">{% for cat in all_categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}</select></div>
            <div class="col-md-6"><label class="font-weight-bold">Bild hochladen</label><input type="file" name="recipe_image" class="form-control-file border p-1 rounded"></div>
        </div>
        <h5 class="text-secondary mt-3">Zeiten & Portionen</h5>
        <div class="row bg-light p-3 rounded mb-4 mx-0">
            <div class="col-md-3"><label class="small">Vorbereitung (Min)</label><input type="number" name="prep_time" class="form-control"></div>
            <div class="col-md-3"><label class="small">Kochen (Min)</label><input type="number" name="cook_time" class="form-control"></div>
            <div class="col-md-3"><label class="small">Ruhen (Min)</label><input type="number" name="rest_time" class="form-control"></div>
            <div class="col-md-3"><label class="small">Portionen</label><input type="number" name="servings" class="form-control"></div>
        </div>
        <h5 class="text-secondary">Zutaten</h5>
        <div id="ingredient-container" class="mb-2">
            <div class="row mb-2"><div class="col-md-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div><div class="col-md-8"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div></div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-info mb-4" onclick="addIngredientRow()">+ Zutat hinzufügen</button>
        <h5 class="text-secondary">Nährwerte (pro 100g)</h5>
        <div class="row bg-light p-3 rounded mb-4 mx-0">
            <div class="col-md-3"><label class="small">Kalorien (kcal)</label><input type="number" name="calories" class="form-control"></div>
            <div class="col-md-3"><label class="small">Eiweiß (g)</label><input type="number" step="0.1" name="protein" class="form-control"></div>
            <div class="col-md-3"><label class="small">KH (g)</label><input type="number" step="0.1" name="carbs" class="form-control"></div>
            <div class="col-md-3"><label class="small">Fett (g)</label><input type="number" step="0.1" name="fat" class="form-control"></div>
        </div>
        <div class="form-group"><label class="font-weight-bold">Zubereitung</label><textarea name="instructions" class="form-control" rows="8" required></textarea></div>
        <button type="submit" class="btn btn-warning btn-block font-weight-bold shadow-sm">Rezept speichern</button>
    </form>
</div>
<script>
function addIngredientRow() {
    const div = document.createElement('div');
    div.className = 'row mb-2';
    div.innerHTML = '<div class="col-md-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div><div class="col-md-8"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div>';
    document.getElementById('ingredient-container').appendChild(div);
}
</script>
{% endblock %}
