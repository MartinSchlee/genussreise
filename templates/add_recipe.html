{% extends "base.html" %}
{% block content %}
<div class="card shadow border-0 p-4 mx-auto" style="max-width: 800px;">
    <h2 class="text-center text-warning font-weight-bold mb-4">
        {% if recipe %}Rezept bearbeiten{% else %}Neues Rezept erstellen{% endif %}
    </h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Name des Rezepts</label>
            <input type="text" name="recipe_name" class="form-control" value="{{ recipe.name if recipe else '' }}" required>
        </div>
        <div class="form-row mb-3">
            <div class="col-md-6">
                <label>Kategorie</label>
                <select name="category_id" class="form-control">
                    {% for cat in all_categories %}
                        <option value="{{ cat.id }}" {% if recipe and recipe.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label>Rezeptbild</label>
                <input type="file" name="recipe_image" class="form-control-file">
            </div>
        </div>
        <div class="form-row mb-4">
            <div class="col-md-3"><label>Vorbereitung</label><input type="number" name="prep_time" class="form-control" value="{{ recipe.prep_time if recipe else 0 }}"></div>
            <div class="col-md-3"><label>Garzeit</label><input type="number" name="cook_time" class="form-control" value="{{ recipe.cook_time if recipe else 0 }}"></div>
            <div class="col-md-3"><label>Ruhezeit</label><input type="number" name="rest_time" class="form-control" value="{{ recipe.rest_time if recipe else 0 }}"></div>
            <div class="col-md-3"><label>Portionen</label><input type="number" name="servings" class="form-control" value="{{ recipe.servings if recipe else 4 }}"></div>
        </div>
        <div class="form-row mb-4">
            <div class="col-md-3"><label>Kalorien</label><input type="number" name="calories" class="form-control" value="{{ recipe.calories if recipe else 0 }}"></div>
            <div class="col-md-3"><label>Eiweiß</label><input type="number" step="0.1" name="protein" class="form-control" value="{{ recipe.protein if recipe else 0 }}"></div>
            <div class="col-md-3"><label>KH</label><input type="number" step="0.1" name="carbs" class="form-control" value="{{ recipe.carbs if recipe else 0 }}"></div>
            <div class="col-md-3"><label>Fett</label><input type="number" step="0.1" name="fat" class="form-control" value="{{ recipe.fat if recipe else 0 }}"></div>
        </div>
        <h5>Zutaten</h5>
        <div id="ingredient-container">
            {% if recipe %}
                {% for ing in recipe.ingredients %}
                <div class="form-row mb-2">
                    <div class="col-4"><input type="text" name="ing_amount[]" class="form-control" value="{{ ing.amount }}"></div>
                    <div class="col-8"><input type="text" name="ing_name[]" class="form-control" value="{{ ing.name }}"></div>
                </div>
                {% endfor %}
            {% else %}
            <div class="form-row mb-2">
                <div class="col-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div>
                <div class="col-8"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div>
            </div>
            {% endif %}
        </div>
        <button type="button" class="btn btn-sm btn-outline-warning mb-4" id="add-ingredient">+ Weitere Zutat</button>
        <div class="form-group">
            <label>Zubereitung</label>
            <textarea name="instructions" class="form-control" rows="8" required>{{ recipe.instructions if recipe else '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-warning btn-block text-white font-weight-bold mt-4">Speichern</button>
    </form>
</div>
<script>
    document.getElementById('add-ingredient').addEventListener('click', function() {
        const div = document.createElement('div');
        div.className = 'form-row mb-2';
        div.innerHTML = '<div class="col-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div><div class="col-8"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div>';
        document.getElementById('ingredient-container').appendChild(div);
    });
</script>
{% endblock %}
