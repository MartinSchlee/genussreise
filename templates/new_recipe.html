{% extends "base.html" %}
{% block content %}
<div class="container mb-5">
    <h2 class="font-weight-bold mb-4">Neues Rezept erstellen</h2>
    <form method="POST" enctype="multipart/form-data" class="bg-white p-4 rounded shadow-sm border">
        <div class="row">
            <div class="col-md-8"><div class="form-group"><label class="font-weight-bold">Rezeptname</label><input type="text" name="name" class="form-control form-control-lg" required></div></div>
            <div class="col-md-4">
                <div class="form-group"><label class="font-weight-bold">Kategorie</label>
                    <select name="category" class="form-control form-control-lg">
                        {% for cat in all_categories %}<option value="{{ cat.name }}">{{ cat.name }}</option>{% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <!-- Reihe: Zeiten -->
        <div class="row bg-light py-3 rounded mb-2 mx-0 border">
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Zubereitung (Min)</label><input type="number" name="prep_time" class="form-control" placeholder="0"></div>
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Kochzeit (Min)</label><input type="number" name="cook_time" class="form-control" placeholder="0"></div>
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Ruhezeit (Min)</label><input type="number" name="rest_time" class="form-control" placeholder="0"></div>
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Portionen</label><input type="number" name="servings" class="form-control" value="1"></div>
        </div>

        <!-- Reihe: Nährwerte -->
        <div class="row bg-dark text-white py-3 rounded mb-4 mx-0">
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Energie (kcal)</label><input type="number" name="calories" class="form-control"></div>
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Eiweiß (g)</label><input type="number" step="0.1" name="protein" class="form-control"></div>
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Kohlenh. (g)</label><input type="number" step="0.1" name="carbs" class="form-control"></div>
            <div class="col-md-3 col-6"><label class="small font-weight-bold">Fett (g)</label><input type="number" step="0.1" name="fat" class="form-control"></div>
        </div>

        <div class="form-group">
            <label class="font-weight-bold">Zutaten</label>
            <div id="ingredient-container">
                <div class="row mb-2">
                    <div class="col-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div>
                    <div class="col-8"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div>
                </div>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addIngredient()">+ Zutat</button>
        </div>

        <div class="form-group mt-4"><label class="font-weight-bold">Zubereitung</label><textarea name="instructions" class="form-control" rows="8" required></textarea></div>
        <div class="form-group"><label class="font-weight-bold">Titelbild</label><input type="file" name="image_file" class="form-control-file"></div>
        <hr><button type="submit" class="btn btn-warning btn-lg btn-block text-white font-weight-bold" style="background:#e2b007; border:none;">Speichern</button>
    </form>
</div>
<script>
function addIngredient() {
    const container = document.getElementById('ingredient-container');
    const div = document.createElement('div'); div.className = 'row mb-2';
    div.innerHTML = `<div class="col-4"><input type="text" name="ing_amount[]" class="form-control"></div><div class="col-8"><input type="text" name="ing_name[]" class="form-control"></div>`;
    container.appendChild(div);
}
</script>
{% endblock %}
