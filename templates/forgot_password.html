{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 p-4">
            <h2 class="text-center text-warning font-weight-bold mb-4">Passwort vergessen?</h2>
            <p class="text-muted text-center">Gib deine E-Mail-Adresse ein. Wir senden dir einen Link zum Zurücksetzen.</p>
            <form method="POST">
                <div class="form-group">
                    <label>E-Mail-Adresse</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning btn-block text-white font-weight-bold">Link anfordern</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-warning small">Zurück zum Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
