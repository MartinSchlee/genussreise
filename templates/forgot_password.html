{% extends "base.html" %}

{% block content %}
<div class="auth-form-container">
    <h2>Passwort zurücksetzen</h2>
    <p class="text-muted mb-4">Gib deine E-Mail-Adresse ein. Wir senden dir einen Link, mit dem du dein Passwort zurücksetzen kannst.</p>
    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="email">E-Mail-Adresse</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block mt-4">Link anfordern</button>
    </form>
    <div class="auth-switch-link">
        <p>Zurück zum <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
