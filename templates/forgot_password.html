{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 400px;">
    <h2 class="text-center mb-4 text-warning">Passwort vergessen</h2>
    <p class="small text-muted text-center mb-4">Gib deine Email-Adresse ein, um einen Reset-Link zu erhalten.</p>
    <form method="POST">
        <div class="form-group">
            <label for="f_email">Email Adresse</label>
            <input type="email" id="f_email" name="email" class="form-control" required placeholder="name@beispiel.de">
        </div>
        <button type="submit" class="btn btn-warning btn-block font-weight-bold">Link anfordern</button>
    </form>
    <div class="text-center mt-3">
        <a href="{{ url_for('login') }}" class="small text-muted">Zurück zum Login</a>
    </div>
</div>
{% endblock %}
