{% extends "base.html" %}
{% block content %}
<h2 class="text-warning font-weight-bold mb-4 text-center">Meine Favoriten</h2>
<div class="row">
    {% if recipes %}
        {% for recipe in recipes %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 border-0 shadow-sm">
                <img src="{{ url_for('static', filename='uploads/' + recipe.image_file) }}" class="card-img-top" style="height: 180px; object-fit: cover;">
                <div class="card-body">
                    <h5>{{ recipe.name }}</h5>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('recipe_detail', recipe_id=recipe.id) }}" class="btn btn-warning btn-sm text-white">Ansehen</a>
                        <form action="{{ url_for('toggle_favorite', recipe_id=recipe.id) }}" method="POST">
                            <button type="submit" class="btn btn-sm text-danger"><i class="fas fa-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    {% else %}<div class="col-12 text-center mt-5"><p class="text-muted">Noch keine Favoriten gespeichert.</p></div>{% endif %}
</div>
{% endblock %}
