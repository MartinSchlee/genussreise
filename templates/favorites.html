{% extends "base.html" %}
{% block title %}Meine Favoriten{% endblock %}
{% block content %}
<h2 class="mb-4 font-weight-bold"><i class="fas fa-heart text-danger mr-2"></i>Deine Merkliste</h2>
<div class="row">
    {% if recipes %}
        {% for recipe in recipes %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
                <img src="{{ url_for('static', filename='uploads/' + recipe.image_file) }}" class="card-img-top" style="height: 180px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title font-weight-bold">{{ recipe.name }}</h5>
                    <a href="{{ url_for('recipe_detail', recipe_id=recipe.id) }}" class="btn btn-warning btn-sm btn-block text-white font-weight-bold" style="background: var(--gold); border: none;">Ansehen</a>
                </div>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="col-12 text-center py-5">
            <p class="text-muted">Deine Merkliste ist noch leer.</p>
            <a href="{{ url_for('index') }}" class="btn btn-outline-warning">Rezepte entdecken</a>
        </div>
    {% endif %}
</div>
{% endblock %}
