{% extends "base.html" %}

{% block title %}Meine Favoriten{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4 font-weight-bold text-danger"><i class="fas fa-heart mr-2"></i>Meine Favoriten</h2>
    
    <div class="row">
        {% if recipes %}
            {% for recipe in recipes %}
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100 border-0 shadow-sm">
                        <img src="{{ url_for('static', filename='uploads/' + recipe.image_file) }}" class="card-img-top" style="object-fit: cover; height: 200px;">
                        <div class="card-body">
                            <h5 class="card-title">{{ recipe.name }}</h5>
                            <a href="{{ url_for('recipe_detail', recipe_id=recipe.id) }}" class="btn btn-sm btn-warning text-white">Ansehen</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <div class="col-12 text-center py-5">
                <p class="text-muted">Noch keine Favoriten gespeichert.</p>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
