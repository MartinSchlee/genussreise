{% extends "base.html" %}
{% block content %}
<div class="card shadow border-0 p-4 mb-5">
    <h2 class="mb-4 text-warning">Rezept bearbeiten: {{ recipe.name }}</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label class="font-weight-bold">Name des Rezepts</label>
            <input type="text" name="recipe_name" class="form-control" value="{{ recipe.name }}" required>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label class="font-weight-bold">Kategorie</label>
                    <select name="category_id" class="form-control">
                        {% for cat in all_categories %}
                            <option value="{{ cat.id }}" {% if recipe.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label class="font-weight-bold">Bild ändern (optional)</label>
                    <input type="file" name="recipe_image" class="form-control-file border p-1 rounded bg-white">
                    <small class="text-muted">Aktuell: {{ recipe.image_file }}</small>
                </div>
            </div>
        </div>

        <h5 class="text-secondary mt-3">Zeiten & Portionen</h5>
        <div class="row bg-light p-3 rounded mb-4 mx-0">
            <div class="col-md-3"><label class="small">Vorbereitung (Min)</label><input type="number" name="prep_time" class="form-control" value="{{ recipe.prep_time }}"></div>
            <div class="col-md-3"><label class="small">Kochen (Min)</label><input type="number" name="cook_time" class="form-control" value="{{ recipe.cook_time }}"></div>
            <div class="col-md-3"><label class="small">Ruhen (Min)</label><input type="number" name="rest_time" class="form-control" value="{{ recipe.rest_time }}"></div>
            <div class="col-md-3"><label class="small">Portionen</label><input type="number" name="servings" class="form-control" value="{{ recipe.servings }}"></div>
        </div>

        <h5 class="text-secondary">Zutaten</h5>
        <div id="ingredient-container" class="mb-3">
            {% for ing in recipe.ingredients %}
            <div class="row mb-2 ingredient-row">
                <div class="col-md-4"><input type="text" name="ing_amount[]" class="form-control" value="{{ ing.amount }}" placeholder="Menge"></div>
                <div class="col-md-7"><input type="text" name="ing_name[]" class="form-control" value="{{ ing.name }}" placeholder="Zutat"></div>
                <div class="col-md-1"><button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">X</button></div>
            </div>
            {% endfor %}
        </div>
        <button type="button" class="btn btn-sm btn-outline-info mb-4" onclick="addIngredientRow()">+ Zutat hinzufügen</button>

        <h5 class="text-secondary">Nährwerte (pro 100g)</h5>
        <div class="row bg-light p-3 rounded mb-4 mx-0">
            <div class="col-md-3"><label class="small">Kalorien (kcal)</label><input type="number" name="calories" class="form-control" value="{{ recipe.calories }}"></div>
            <div class="col-md-3"><label class="small">Eiweiß (g)</label><input type="number" step="0.1" name="protein" class="form-control" value="{{ recipe.protein }}"></div>
            <div class="col-md-3"><label class="small">KH (g)</label><input type="number" step="0.1" name="carbs" class="form-control" value="{{ recipe.carbs }}"></div>
            <div class="col-md-3"><label class="small">Fett (g)</label><input type="number" step="0.1" name="fat" class="form-control" value="{{ recipe.fat }}"></div>
        </div>

        <div class="form-group">
            <label class="font-weight-bold">Zubereitung</label>
            <textarea name="instructions" class="form-control" rows="8" required>{{ recipe.instructions }}</textarea>
        </div>
        
        <div class="d-flex">
            <button type="submit" class="btn btn-warning btn-block font-weight-bold mr-2">Änderungen speichern</button>
            <a href="{{ url_for('recipe_detail', recipe_id=recipe.id) }}" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</div>

<script>
function addIngredientRow() {
    const container = document.getElementById('ingredient-container');
    const newRow = document.createElement('div');
    newRow.className = 'row mb-2 ingredient-row';
    newRow.innerHTML = `
        <div class="col-md-4"><input type="text" name="ing_amount[]" class="form-control" placeholder="Menge"></div>
        <div class="col-md-7"><input type="text" name="ing_name[]" class="form-control" placeholder="Zutat"></div>
        <div class="col-md-1"><button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.parentElement.remove()">X</button></div>
    `;
    container.appendChild(newRow);
}
</script>
{% endblock %}
