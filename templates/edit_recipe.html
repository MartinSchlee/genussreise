{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Rezept bearbeiten: {{ recipe.name }}</h2>
    <form method="POST" action="{{ url_for('edit_recipe', recipe_id=recipe.id) }}" enctype="multipart/form-data">
        <!-- ... (Name, Portionen, etc. wie oben) ... -->
        
        <!-- VEREINFACHUNG: Dropdown mit der aktuellen Kategorie vorausgewählt -->
        <div class="form-group">
            <label for="category_id">Kategorie</label>
            <select class="form-control" id="category_id" name="category_id" required>
                {% for category in categories %}
                    <option value="{{ category.id }}" {% if category.id == recipe.category_id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- ... (Anleitung, Bild-Upload etc. können hier noch ergänzt werden) ... -->
        
        <button type="submit" class="btn btn-primary mt-3">Änderungen speichern</button>
    </form>
</div>
{% endblock %}
