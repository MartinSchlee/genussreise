{% extends "base.html" %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <!-- Die Card sorgt für den weißen Kasten und den Abstand zum Rand -->
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white p-4">
                    <h2 class="mb-0"><i class="fas fa-edit mr-2"></i>Rezept bearbeiten: {{ recipe.name }}</h2>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form action="{{ url_for('edit_recipe', recipe_id=recipe.id) }}" method="POST" enctype="multipart/form-data">
                        
                        <!-- Rezeptname -->
                        <div class="form-group mb-4">
                            <label class="font-weight-bold">Rezeptname</label>
                            <input type="text" name="recipe_name" class="form-control form-control-lg" value="{{ recipe.name }}" required>
                        </div>

                        <div class="row">
                            <!-- Kategorie -->
                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">Kategorie</label>
                                <select name="category_id" class="form-control">
                                    {% for cat in all_categories %}
                                        <option value="{{ cat.id }}" {% if recipe.category_id == cat.id %}selected{% endif %}>
                                            {{ cat.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <!-- Bild ändern -->
                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">Bild ändern (optional)</label>
                                <div class="custom-file">
                                    <input type="file" name="image_file" class="custom-file-input" id="imageInput">
                                    <label class="custom-file-label" for="imageInput">Datei wählen...</label>
                                </div>
                            </div>
                        </div>

                        <h4 class="border-bottom pb-2 mb-4 mt-2">Allgemeine Angaben</h4>
                        <div class="row mb-4">
                            <div class="col-md-4">
                                <label>Portionen</label>
                                <input type="text" name="servings" class="form-control" value="{{ recipe.servings }}">
                            </div>
                            <div class="col-md-4">
                                <label>Vorbereitung (Min.)</label>
                                <input type="number" name="prep_time" class="form-control" value="{{ recipe.prep_time }}">
                            </div>
                            <div class="col-md-4">
                                <label>Garzeit (Min.)</label>
                                <input type="number" name="cook_time" class="form-control" value="{{ recipe.cook_time }}">
                            </div>
                        </div>

                        <h4 class="border-bottom pb-2 mb-4">Zutaten</h4>
                        <div id="ingredients-container">
                            {% for ing in recipe.ingredients %}
                            <div class="row mb-2 ingredient-row">
                                <div class="col-md-2">
                                    <input type="text" name="quantity[]" class="form-control" placeholder="Menge" value="{{ ing.quantity }}">
                                </div>
                                <div class="col-md-2">
                                    <input type="text" name="unit[]" class="form-control" placeholder="Einheit" value="{{ ing.unit }}">
                                </div>
                                <div class="col-md-8">
                                    <input type="text" name="ingredient_name[]" class="form-control" placeholder="Zutat" value="{{ ing.name }}">
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                        <button type="button" class="btn btn-outline-info btn-sm mt-2 mb-4" onclick="addIngredient()">
                            <i class="fas fa-plus"></i> Weitere Zutat hinzufügen
                        </button>

                        <h4 class="border-bottom pb-2 mb-4">Zubereitung</h4>
                        <div class="form-group mb-4">
                            <textarea name="instructions" class="form-control" rows="10" required>{{ recipe.instructions }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between pt-4 border-top">
                            <a href="{{ url_for('recipe_detail', recipe_id=recipe.id) }}" class="btn btn-outline-secondary">Abbrechen</a>
                            <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm">
                                <i class="fas fa-save mr-2"></i>Änderungen speichern
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Kleines Script zum dynamischen Hinzufügen von Zutaten-Zeilen -->
<script>
function addIngredient() {
    const container = document.getElementById('ingredients-container');
    const newRow = document.createElement('div');
    newRow.className = 'row mb-2 ingredient-row';
    newRow.innerHTML = `
        <div class="col-md-2"><input type="text" name="quantity[]" class="form-control" placeholder="Menge"></div>
        <div class="col-md-2"><input type="text" name="unit[]" class="form-control" placeholder="Einheit"></div>
        <div class="col-md-8"><input type="text" name="ingredient_name[]" class="form-control" placeholder="Zutat"></div>
    `;
    container.appendChild(newRow);
}

// Zeigt den Dateinamen im Upload-Feld an
document.getElementById('imageInput').onchange = function () {
    var fileName = this.value.split("\\").pop();
    this.nextElementSibling.classList.add("selected");
    this.nextElementSibling.innerHTML = fileName;
};
</script>
{% endblock %}
