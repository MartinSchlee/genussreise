<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Genussreise</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <style>
        :root { --gold: #e2b007; }
        .navbar-dark .navbar-brand i { color: var(--gold); }
        .dropdown-menu { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-height: 400px; overflow-y: auto; }
        
        .search-input { 
            border-radius: 20px 0 0 20px; background: #2c3034; border: none; color: white !important; transition: all 0.3s; 
        }
        .search-input:focus { 
            background: white !important; color: #212529 !important; box-shadow: none; 
        }
        .search-btn { border-radius: 0 20px 20px 0; background: var(--gold); border: none; color: white; }
        .nav-btn-gold { background: var(--gold); color: white !important; border-radius: 20px; font-weight: bold; padding: 5px 15px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="{{ url_for('index') }}"><i class="fas fa-utensils mr-2"></i>Genussreise</a>
            <form class="form-inline mx-lg-4 flex-grow-1" action="{{ url_for('index') }}" method="GET">
                <div class="input-group w-100">
                    <input class="form-control search-input" type="search" name="q" placeholder="Rezept suchen..." value="{{ search_query or '' }}">
                    <div class="input-group-append"><button class="btn search-btn" type="submit"><i class="fas fa-search"></i></button></div>
                </div>
            </form>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" id="catDrop" data-toggle="dropdown">Kategorien</a>
                        <div class="dropdown-menu">
                            {% for cat in all_categories %}<a class="dropdown-item" href="#">{{ cat.name }}</a>{% endfor %}
                        </div>
                    </li>
                    {% if current_user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}">Profil</a></li>
                        <li class="nav-item"><a class="btn btn-outline-light btn-sm ml-2" href="{{ url_for('logout') }}">Abmelden</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('login') }}">Login</a></li>
                        <li class="nav-item"><a class="nav-link nav-btn-gold ml-2" href="{{ url_for('register') }}">Registrieren</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">{% block content %}{% endblock %}</div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
