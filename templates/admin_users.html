{% extends "base.html" %}
{% block content %}
<h2 class="mb-4 font-weight-bold">Benutzerverwaltung</h2>
<div class="card border-0 shadow-sm overflow-hidden">
    <table class="table table-hover mb-0">
        <thead class="thead-light">
            <tr><th>ID</th><th>Name</th><th>Status</th><th class="text-right">Aktion</th></tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td><strong>{{ u.username }}</strong><br><small>{{ u.email }}</small></td>
                <td>{% if u.is_admin %}<span class="badge badge-warning">Admin</span>{% else %}User{% endif %}</td>
                <td class="text-right">
                    {% if u.id != current_user.id %}
                        <form action="{{ url_for('admin_delete_user', user_id=u.id) }}" method="POST">
                            <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Löschen?')"><i class="fas fa-trash"></i></button>
                        </form>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
